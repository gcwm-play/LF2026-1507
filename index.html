<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPFB EXPLORER 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        body { background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; font-family: system-ui, -apple-system, sans-serif; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .transition-all { transition-duration: 500ms; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Native Loading Screen -->
        <div id="boot-loader" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617;">
            <div style="width: 40px; height: 40px; border: 3px solid #f59e0b; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 24px; font-family: monospace; font-size: 10px; color: #475569; letter-spacing: 4px; text-transform: uppercase;">Establishing Uplink</p>
        </div>
    </div>

    <script type="module">
        import React, { useState, useEffect, createElement as h } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCtLboyP7fDO70VksvVvcRAhwRQfTJ1o5o",
            authDomain: "cpfb-explorer.firebaseapp.com",
            projectId: "cpfb-explorer",
            storageBucket: "cpfb-explorer.firebasestorage.app",
            messagingSenderId: "418397881163",
            appId: "1:418397881163:web:2cd412b38b60c3c9149ece"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "cpfb-explorer-30";

        // SVG Icons (Native Strings)
        const Icons = {
            Trees: () => h('svg', {width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2}, h('path', {d: "M10 22v-6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v6"}), h('path', {d: "M22 22v-6a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v6"}), h('path', {d: "M16 11V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v8"}), h('path', {d: "M12 2v2"}), h('path', {d: "M17 11H7"})),
            Waves: () => h('svg', {width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2}, h('path', {d: "M2 6c.6.5 1.2 1 2.5 1C5.8 7 7 6 7 6s1.2-1 2.5-1c1.3 0 2.5 1 2.5 1s1.2 1 2.5 1c1.3 0 2.5-1 2.5-1s1.2-1 2.5-1c1.3 0 2.5 1 2.5 1"}), h('path', {d: "M2 12c.6.5 1.2 1 2.5 1 1.3 0 2.5-1 2.5-1s1.2-1 2.5-1c1.3 0 2.5 1 2.5 1s1.2 1 2.5 1c1.3 0 2.5-1 2.5-1s1.2-1 2.5-1c1.3 0 2.5 1 2.5 1"}), h('path', {d: "M2 18c.6.5 1.2 1 2.5 1 1.3 0 2.5-1 2.5-1s1.2-1 2.5-1c1.3 0 2.5 1 2.5 1s1.2 1 2.5 1c1.3 0 2.5-1 2.5-1s1.2-1 2.5-1c1.3 0 2.5 1 2.5 1"})),
            Skull: () => h('svg', {width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2}, h('path', {d: "M9 10L9.01 10"}), h('path', {d: "M15 10L15.01 10"}), h('path', {d: "M10 20v-3a2 2 0 0 0-2-2H6a4 4 0 0 1-4-4V8a8 8 0 0 1 16 0v3a4 4 0 0 1-4 4h-2a2 2 0 0 0-2 2v3"}), h('path', {d: "M14 20h-4"})),
            Mountain: () => h('svg', {width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2}, h('path', {d: "m8 3 4 8 5-5 5 15H2L8 3z"})),
            Sun: () => h('svg', {width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2}, h('circle', {cx: 12, cy: 12, r: 4}), h('path', {d: "M12 2v2"}), h('path', {d: "M12 20v2"}), h('path', {d: "m4.93 4.93 1.41 1.41"}), h('path', {d: "m17.66 17.66 1.41 1.41"}), h('path', {d: "M2 12h2"}), h('path', {d: "M20 12h2"}), h('path', {d: "m6.34 17.66-1.41 1.41"}), h('path', {d: "m19.07 4.93-1.41 1.41"})),
            Check: () => h('svg', {width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 3}, h('polyline', {points: "20 6 9 17 4 12"})),
            Award: () => h('svg', {width: 48, height: 48, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2}, h('circle', {cx: 12, cy: 8, r: 6}), h('path', {d: "M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"})),
            Ticket: () => h('svg', {width: 48, height: 48, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2}, h('path', {d: "M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2Z"}), h('path', {d: "M13 5v2"}), h('path', {d: "M13 17v2"}), h('path', {d: "M13 11v2"}))
        };

        const BOOTH_DATA = [
            { id: 'forest', realmName: "Verdant Grove", code: "100", title: "Sustainable Growth & ESG", why: "Build long-term value via ESG.", icon: Icons.Trees, color: "emerald" },
            { id: 'island', realmName: "Cerulean Depths", code: "200", title: "Data Analytics", why: "Master complex patterns.", icon: Icons.Waves, color: "cyan" },
            { id: 'swamp', realmName: "Shadow Spire", code: "300", title: "Cybersecurity", why: "Protect digital assets.", icon: Icons.Skull, color: "purple" },
            { id: 'mountain', realmName: "Iron Peak", code: "400", title: "Leadership", why: "Lead through transformation.", icon: Icons.Mountain, color: "orange" },
            { id: 'plains', realmName: "Golden Expanse", code: "500", title: "Strategic Foresight", why: "Illuminate future trends.", icon: Icons.Sun, color: "amber" }
        ];

        function Main() {
            const [user, setUser] = useState(null);
            const [unlocked, setUnlocked] = useState({});
            const [isReady, setIsReady] = useState(false);
            const [activeId, setActiveId] = useState(null);
            const [formData, setFormData] = useState({ name: '', email: '', dept: '', supEmail: '' });
            const [submitted, setSubmitted] = useState(false);
            const [isConfirming, setIsConfirming] = useState(false);
            const [adminOpen, setAdminOpen] = useState(false);
            const [adminClick, setAdminClick] = useState(0);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    if (!u) {
                        signInAnonymously(auth);
                    } else {
                        setUser(u);
                        const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', u.uid, 'state', 'progress'));
                        if (snap.exists()) {
                            setUnlocked(snap.data().unlocked || {});
                            if (snap.data().completed) setSubmitted(true);
                        }
                        setIsReady(true);
                    }
                });
                return unsubscribe;
            }, []);

            const doUnlock = async (id) => {
                const next = { ...unlocked, [id]: true };
                setUnlocked(next);
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'state', 'progress'), { unlocked: next, completed: false });
            };

            const finish = async () => {
                try {
                    const now = new Date();
                    const payload = { ...formData, timestamp: now.toISOString(), submissionDate: now.toLocaleDateString(), submissionTime: now.toLocaleTimeString(), userId: user.uid, hasBonus: !!formData.supEmail };
                    await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'registrations'), payload);
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'state', 'progress'), { unlocked, completed: true });
                    setSubmitted(true);
                } catch (e) { alert("Sync Failure. Check Internet."); }
            };

            const adminTrigger = () => {
                const c = adminClick + 1;
                if (c >= 5) { setAdminOpen(true); setAdminClick(0); }
                else setAdminClick(c);
            };

            if (!isReady) return null;

            const activeData = BOOTH_DATA.find(d => d.id === activeId);
            const count = Object.keys(unlocked).length;

            return h('div', { className: `min-h-screen transition-colors duration-1000 ${activeData ? `bg-${activeData.color}-950` : 'bg-slate-950'}` },
                adminOpen && h(AdminUI, { onClose: () => setAdminOpen(false) }),
                h('header', { className: "p-6 border-b border-white/10 flex justify-between items-center backdrop-blur-md sticky top-0 z-40" },
                    h('div', { onClick: adminTrigger },
                        h('h1', { className: "font-black text-xl tracking-tighter" }, "CPFB EXPLORER 3.0"),
                        h('p', { className: "text-[9px] font-mono text-slate-500" }, `${count}/5 REALMS SYNCED`)
                    ),
                    h('div', { className: "flex gap-1" }, BOOTH_DATA.map(b => h('div', { key: b.id, className: `w-2 h-2 rounded-full ${unlocked[b.id] ? 'bg-amber-400' : 'bg-white/10'}` })))
                ),
                h('main', { className: "max-w-md mx-auto p-6 pb-20" },
                    submitted ? h(Pass, { data: formData }) :
                    count === 5 && !activeId ? h(FinalForm, { formData, setFormData, onFinish: finish, isConfirming, setIsConfirming }) :
                    activeId ? h(InputUI, { data: activeData, isUnlocked: unlocked[activeId], onUnlock: () => doUnlock(activeId), onBack: () => setActiveId(null) }) :
                    h('div', { className: "space-y-6" },
                        h('div', { className: "bg-white/5 border border-white/10 p-6 rounded-3xl" }, h('p', { className: "text-xs font-bold text-amber-500 uppercase tracking-widest" }, "Briefing"), h('p', { className: "text-[11px] text-slate-400 italic leading-relaxed" }, "Visit booths, collect the keys, and sync all realms.")),
                        h('div', { className: "grid gap-3" }, BOOTH_DATA.map(b => h('button', { key: b.id, onClick: () => setActiveId(b.id), className: `flex items-center p-5 rounded-3xl border transition-all ${unlocked[b.id] ? 'bg-white/5 border-amber-500/50 shadow-lg' : 'bg-white/5 border-white/5'}` },
                            h('div', { className: `p-4 rounded-2xl mr-4 ${unlocked[b.id] ? 'bg-amber-400 text-black' : 'bg-white/5 text-white/20'}` }, h(unlocked[b.id] ? Icons.Check : b.icon)),
                            h('div', { className: "flex-1 text-left" }, h('h3', { className: "font-bold text-sm uppercase" }, b.realmName), h('p', { className: "text-[9px] font-mono text-white/30 uppercase" }, unlocked[b.id] ? "SYNCED" : "OFFLINE"))
                        )))
                    )
                )
            );
        }

        function InputUI({ data, isUnlocked, onUnlock, onBack }) {
            const [val, setVal] = useState('');
            const [load, setLoad] = useState(false);
            const [shake, setShake] = useState(false);
            if (isUnlocked) return h('div', { className: "space-y-6 text-center" },
                h('div', { className: "bg-white/5 border border-white/10 p-10 rounded-[3rem] space-y-6" },
                    h('div', { className: "w-16 h-16 bg-amber-500 rounded-full flex items-center justify-center mx-auto" }, h(Icons.Sun, { className: "text-black" })),
                    h('h3', { className: "font-black text-xl uppercase" }, "Sync Active"),
                    h('div', { className: "bg-black/40 p-5 rounded-2xl text-left" }, h('p', { className: "text-xs font-bold uppercase mb-1" }, data.title), h('p', { className: "text-[10px] text-slate-400 italic" }, data.why))
                ),
                h('button', { onClick: onBack, className: "w-full py-5 bg-white/10 rounded-2xl font-black text-xs uppercase" }, "Back to Hub")
            );
            return h('div', { className: `space-y-10 ${shake ? 'animate-shake' : ''}` },
                h('div', { className: "bg-black/40 border border-white/10 p-12 rounded-[3rem] text-center shadow-inner" }, h('p', { className: "text-[10px] font-mono text-slate-500 uppercase mb-8" }, "Enter Realm Key"), h('input', { type: "number", value: val, onChange: e => setVal(e.target.value.slice(0,3)), className: "bg-transparent border-b-2 border-white/20 text-center text-5xl font-mono w-full outline-none text-white", placeholder: "•••" })),
                h('button', { onClick: () => { setLoad(true); setTimeout(() => { if(val === data.code) onUnlock(); else { setShake(true); setTimeout(()=>setShake(false), 500); setVal(''); } setLoad(false); }, 800); }, className: "w-full py-6 bg-amber-500 text-black font-black rounded-3xl uppercase tracking-widest" }, load ? "VALIDATING..." : "ESTABLISH UPLINK")
            );
        }

        function FinalForm({ formData, setFormData, onFinish, isConfirming, setIsConfirming }) {
            const upd = (k, v) => setFormData({...formData, [k]: v});
            if (isConfirming) return h('div', { className: "bg-slate-900 border-2 border-amber-500 p-8 rounded-[3rem] space-y-6 shadow-2xl" },
                h('h4', { className: "text-center font-black uppercase text-amber-500" }, "Verify Details"),
                h('div', { className: "bg-black/40 p-6 rounded-2xl space-y-4 text-xs" },
                    h('div', null, h('p', {className:"text-[8px] text-slate-500"}, "Explorer"), h('p', {className:"font-bold uppercase"}, formData.name)),
                    h('div', null, h('p', {className:"text-[8px] text-slate-500"}, "Contact"), h('p', {className:"font-mono lowercase"}, formData.email))
                ),
                h('button', { onClick: onFinish, className: "w-full py-5 bg-amber-500 text-black font-black rounded-3xl uppercase" }, "Final Handshake"),
                h('button', { onClick: () => setIsConfirming(false), className: "w-full text-[9px] text-slate-600 uppercase" }, "Edit Profile")
            );
            return h('div', { className: "bg-white/5 border border-white/10 p-8 rounded-[3rem] space-y-4" },
                h('h3', { className: "text-center font-black uppercase mb-4" }, "Archive Handshake"),
                h('input', { type: "text", placeholder: "Full Name *", value: formData.name, onChange: e => upd('name', e.target.value), className: "w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none" }),
                h('input', { type: "text", placeholder: "Dept *", value: formData.dept, onChange: e => upd('dept', e.target.value), className: "w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none" }),
                h('input', { type: "email", placeholder: "Email *", value: formData.email, onChange: e => upd('email', e.target.value), className: "w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none" }),
                h('input', { type: "email", placeholder: "Supervisor Email", value: formData.supEmail, onChange: e => upd('supEmail', e.target.value), className: "w-full bg-black/40 border border-white/10 p-4 rounded-xl text-white outline-none" }),
                h('button', { onClick: () => setIsConfirming(true), className: "w-full py-5 bg-white text-black font-black rounded-2xl uppercase mt-2 shadow-xl" }, "Preview")
            );
        }

        function Pass({ data }) {
            const bonus = data.supEmail && data.supEmail.includes('@');
            return h('div', { className: "bg-slate-900 border-4 border-amber-500 rounded-[3.5rem] overflow-hidden shadow-2xl animate-in zoom-in" },
                h('div', { className: `${bonus ? 'bg-amber-500 text-black' : 'bg-slate-800 text-slate-400'} p-12 text-center font-black uppercase` },
                    h(bonus ? Icons.Award : Icons.Ticket, { className: "mx-auto mb-4" }),
                    h('h2', { className: "text-3xl tracking-tighter" }, bonus ? 'Bonus Pass' : 'Standard Pass'),
                    h('p', { className: "text-[10px] opacity-60" }, "Status: AUTHORIZED")
                ),
                h('div', { className: "p-10 space-y-4" },
                    h('div', { className: "flex justify-between" }, h('span', {className:"text-[9px] text-slate-600 uppercase"}, "Explorer"), h('span', {className:"text-sm font-bold uppercase"}, data.name)),
                    h('p', { className: "text-[10px] text-slate-500 text-center italic" }, "Sync complete. Roadmap delivery in 1-2 days.")
                ),
                h('button', { onClick: () => window.location.reload(), className: "w-full py-6 text-[10px] font-mono text-slate-700 uppercase" }, "New Mission")
            );
        }

        function AdminUI({ onClose }) {
            const [logs, setLogs] = useState([]);
            useEffect(() => {
                const q = query(collection(db, `artifacts/${APP_ID}/public/data/registrations`));
                return onSnapshot(q, s => {
                    const d = s.docs.map(x => ({id: x.id, ...x.data()}));
                    setLogs(d.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
                });
            }, []);
            return h('div', { className: "fixed inset-0 z-50 bg-slate-950 p-6 flex flex-col" },
                h('header', { className: "flex justify-between items-center mb-8 font-black uppercase" }, h('div', null, "Archive Logs"), h('div', { onClick: onClose }, "CLOSE")),
                h('div', { className: "flex-1 overflow-auto space-y-3" },
                    h('p', {className:"text-[10px] font-mono text-slate-500 mb-4"}, `${logs.length} Submissions`),
                    logs.map(l => h('div', { key: l.id, className: "p-4 bg-white/5 border border-white/5 rounded-2xl" }, h('p', {className:"text-xs font-bold uppercase"}, l.name), h('p', {className:"text-[9px] text-slate-500"}, l.email)))
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(Main));
    </script>
</body>
</html>
